<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products</title>
    <style>
        body { 
            background: linear-gradient(135deg, #3a1e0d, #2d1d13); 
            font-family: cursive; 
            color: white; 
            text-align: center; 
            padding: 30px; 
        }
        h1 { 
            margin-bottom: 30px; 
            text-shadow: 0 0 10px #ff6a00; 
        }
        .search-container { 
            margin-bottom: 25px; 
        }
        #search-bar { 
            width: 100%; 
            max-width: 350px; 
            padding: 10px 15px; 
            font-size: 16px; 
            font-family: cursive; 
            background-color: #2b1a10; 
            border: 2px solid #ffb703; 
            border-radius: 20px; 
            color: white; 
            outline: none; 
            box-shadow: 0 0 10px #ff5e00; 
        }
        #search-bar:focus { 
            box-shadow: 0 0 20px 4px #ff5e00; 
        }
        #search-bar::placeholder { 
            color: #bfa695; 
        }
        #product-list { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 25px; 
            margin-top: 20px;
        }
        #product-list > div { 
            border: 2px solid #ffb703; 
            box-shadow: 0 0 15px 2px #ff5e00; 
            background-color: #2b1a10; 
            padding: 20px; 
            border-radius: 8px; 
            width: 220px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            transition: transform 0.2s ease; 
        }
        #product-list > div:hover { 
            transform: translateY(-10px); 
        }
        #product-list img { 
            width: 100%; 
            max-width: 160px; 
            height: 160px; 
            object-fit: contain; 
            background-color: #3a2416; 
            border-radius: 6px; 
            margin: 10px 0; 
        }
        #product-list h3 { 
            margin: 5px 0; 
            font-size: 18px; 
            color: #ffb703; 
        }
        #product-list p { 
            margin: 5px 0; 
            font-size: 16px; 
            color: #f5f5f5; 
        }
        button { 
            width: 110px; 
            height: 40px; 
            background-color: #ff5e00; 
            color: white; 
            border-radius: 5px; 
            border: 1px solid #ffb703; 
            font-family: cursive; 
            cursor: pointer; 
            margin: 5px;
        }
        button:hover { 
            transform: scale(1.05); 
        }

        /* --- CSS SPINNER ANIMATION --- */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: #ffb703;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
      
    </style>
</head>
<body>

    <h1>My Products</h1>

    <div class="search-container">
        <input type="text" id="search-bar" onkeyup="searchProducts()" placeholder="Search product names">
    </div>

    <h2>Filters</h2>
    <div>
        <button type="button" onclick="filterProducts('all')">Show All</button>
        <button type="button" onclick="filterProducts('groceries')">Groceries</button>
        <button type="button" onclick="filterProducts('beauty')">Beauty</button>
        <button type="button" onclick="filterProducts('furniture')">Furniture</button>
        <button type="button" onclick="filterProducts('fragrances')">Fragrances</button>
    </div>

    <div id="spinner" class="spinner"></div>
    
    <div id="product-list"></div>
 <script>
        let productsArr = [];
        const box = document.getElementById('product-list');
        const spinner = document.getElementById('spinner');

        fetch('https://dummyjson.com/product')
            .then(res => res.json())
            .then(data => {
                productsArr = data.products;
                spinner.style.display = 'none'; 
                displayProducts(productsArr);
            });

        function displayProducts(arr) {
            box.innerHTML = "";
            if (arr.length === 0) {
                box.innerHTML = "<p style='color: #ffb703;'>No matching items found</p>";
                return;
            }
            arr.map(p => {
                box.innerHTML += `
                    <div>
                        <img src="${p.thumbnail}">
                        <h3>${p.title}</h3>
                        <p>Price: $${p.price}</p>
                    </div>
                `;
            });
        }

        function searchProducts() {
            let text = document.getElementById('search-bar').value.toLowerCase();
            let filtered = productsArr.filter(p => p.title.toLowerCase().includes(text));
            displayProducts(filtered);
        }

        function filterProducts(fill) {
            document.getElementById('search-bar').value = "";
            if (fill === 'all') return displayProducts(productsArr);
            let filtered = productsArr.filter(p => p.category.toLowerCase() === fill.toLowerCase());
            displayProducts(filtered);
        }
    </script> 
    </body>
     </html>
