<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <style>
        body {
            background-color: rgb(41, 1, 79);
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        input {
            background-color: rgb(60, 2, 114);
            padding: 10px;
            margin: 5px;
            width: 150px;
        }

        button {
            background-color: rgb(115, 7, 216);
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }

        h2 {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Simple Calculator</h1>

    <input type="number" id="num1" placeholder="First Number">
    <input type="number" id="num2" placeholder="Second Number">
    <br><br>

    <button onclick="calculate('+')">+</button>
    <button onclick="calculate('-')">-</button>
    <button onclick="calculate('*')">×</button>
    <button onclick="calculate('/')">÷</button>

    <h2>Answer: <span id="result">0</span></h2>

    <script>
        function calculate(operator) {
            let num1 = Number(document.getElementById("num1").value);
            let num2 = Number(document.getElementById("num2").value);
            let answer;
            if (!num1 || !num2) {
                alert("place a number before pressing the button")
            }else if (operator === "+") {
                answer = num1 + num2;
            } else if (operator === "-") {
                answer = num1 - num2;
            } else if (operator === "*") {
                answer = num1 * num2;
            } else if (operator === "/") {
                answer = num2 !== 0 ? num1 / num2 : "Cannot divide by zero";
            }

            document.getElementById("result").textContent = answer;
        }
    </script>

</body>
</html>
