<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Watch</title>
    <style>
      body {
        margin-top: 80px;
        background-color: #f0f0f0;
        font-family: "Courier New", Courier;
        background: rgb(234, 216, 171);
      }

      .wrap {
        height: 170px;
        width: 80px;
        background-color: #333;
        justify-self: center;
        border: 2px solid #111;
        box-shadow: 0px 7px 30px rgba(30, 45, 45);
      }

      .wrap:first-child {
        border-top-left-radius: 15px;
        border-top-right-radius: 15px;
      }

      .wrap:last-of-type {
        border-bottom-left-radius: 15px;
        border-bottom-right-radius: 15px;
      }
      .wrap:last-of-type.div {
        height: 100px;
        width: 5px;
        background-color: black;
      }

      .showbox {
        width: 150px;
        height: 111px;
        border: 4px solid #0a0a0a;
        background-color: #eddbcd;
        justify-self: center;
        border-radius: 25px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        z-index: 2;
        position: relative;
      }

      .time-display {
        font-size: 2rem;
        font-weight: bold;
        margin: 0;
        color: #222;
      }
      .seconds-display {
        font-size: 1.3rem;
        margin-top: 5px;
        color: #444;
      }
      .circle {
        justify-self: center;
        align-self: center;
        width: 10px;
        height: 10px;
        background-color: navajowhite;
        border-radius: 50%;
        margin-top: 30px;
      }
      hr {
        width: 88px;
        height: 2px;
        background-color: rgb(69, 45, 1);
        border: none;
      }
      .vertical-line {
        justify-self: center;
        border-left: 3px solid rgb(69, 45, 1);;
        border-right: 3px solid rgb(69, 45, 1);
        border-top: 5px solid rgb(69, 45, 1);;
        height: 50px;
        width: 76px;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
      }
      .line {
        justify-self: center;
        border-left: 3px solid rgb(69, 45, 1);
        height: 40px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="vertical-line"><div class="line"></div></div>
    <div class="wrap">
      <div class="holder"></div>
    </div>

    <div class="showbox">
      <h1 class="time-display" id="clock">00:00</h1>
      <div class="seconds-display" id="seconds">00</div>
      <div class="brand">Digital Watch</div>
    </div>

    <div class="wrap">
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
    </div>
    <script>
      function clockUp() {
        const newClock = document.getElementById("clock");
        const newSeconds = document.getElementById("seconds");
        function getnewTime() {
          const newTime = new Date();
          let hours = newTime.getHours();
          let minutes = newTime.getMinutes();
          let seconds = newTime.getSeconds();
          if (hours < 10) {
            hours = "0" + hours;
          }
          if (minutes < 10) {
            minutes = "0" + minutes;
          }
          if (seconds < 10) {
            seconds = "0" + seconds;
          }
          newClock.innerText = `${hours}:${minutes}`;
          newSeconds.innerText = `${seconds}`;
        }
        getnewTime();
        setInterval(() => {
          getnewTime();
        }, 1000);
      }
      clockUp();
    </script>
  </body>
</html>
