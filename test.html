```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronCore Gym App</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#120C17;
  color:white;
}

:root{
  --primary:#9D50BB;
  --dark:#120C17;
  --card:#1D1426;
  --border:#33253f;
}

.auth-screen{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  background:linear-gradient(135deg,#120C17,#9D50BB);
}

.auth-box{
  width:380px;
  background:#1D1426;
  padding:30px;
  border-radius:20px;
}

.auth-title{
  text-align:center;
  margin-bottom:25px;
  color:#9D50BB;
  font-size:32px;
}

.tabs{
  display:flex;
  margin-bottom:20px;
  background:#2b1e36;
  border-radius:10px;
  overflow:hidden;
}

.tabs button{
  flex:1;
  border:none;
  padding:12px;
  background:transparent;
  color:white;
  cursor:pointer;
}

.tabs .active{
  background:#9D50BB;
}

input,select{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border:none;
  border-radius:10px;
  background:#2b1e36;
  color:white;
}

button{
  padding:14px;
  border:none;
  border-radius:10px;
  background:#9D50BB;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.full-btn{
  width:100%;
}

.app{
  display:none;
}

.app.show{
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:260px;
  background:#1D1426;
  padding:20px;
  border-right:1px solid var(--border);
}

.logo{
  font-size:30px;
  font-weight:bold;
  color:#9D50BB;
  margin-bottom:30px;
  text-align:center;
}

.nav-item{
  padding:14px;
  margin-bottom:10px;
  border-radius:12px;
  background:#24192e;
  cursor:pointer;
}

.nav-item.active,
.nav-item:hover{
  background:#9D50BB;
}

.main{
  flex:1;
  padding:25px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:25px;
}

.card{
  background:#1D1426;
  padding:20px;
  border-radius:20px;
  border:1px solid var(--border);
}

.card h3{
  color:#9D50BB;
  margin-bottom:10px;
}

.table-box{
  background:#1D1426;
  border-radius:20px;
  overflow:auto;
}

.table-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:15px;
  border-bottom:1px solid var(--border);
  text-align:left;
}

th{
  background:#24192e;
}

.badge{
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
}

.green{
  background:#2ecc71;
  color:black;
}

.red{
  background:#ff4d4d;
}

.yellow{
  background:#f1c40f;
  color:black;
}

.page{
  display:none;
}

.page.active{
  display:block;
}

.flex{
  display:flex;
  gap:10px;
}

.small-btn{
  padding:10px 14px;
}

.logout-btn{
  margin-top:30px;
  background:#ff4d4d;
  width:100%;
}

.class-card{
  background:#24192e;
  padding:18px;
  border-radius:15px;
  margin-bottom:15px;
}

.profile-box{
  background:#1D1426;
  padding:30px;
  border-radius:20px;
  max-width:500px;
}
</style>
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-box">

    <div class="auth-title">IRONCORE</div>

    <div class="tabs">
      <button class="active" id="loginTab" onclick="switchTab('login')">Login</button>
      <button id="signupTab" onclick="switchTab('signup')">Signup</button>
    </div>

    <div id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">
      <button class="full-btn" onclick="login()">Login</button>

      <br><br>

      <p style="font-size:13px;text-align:center">
        Admin Login:<br>
        admin@gym.com / admin123
      </p>
    </div>

    <div id="signupForm" style="display:none">
      <input type="text" id="signupName" placeholder="Full Name">
      <input type="email" id="signupEmail" placeholder="Email">
      <input type="password" id="signupPassword" placeholder="Password">

      <select id="signupRole">
        <option value="member">Member</option>
        <option value="trainer">Trainer</option>
      </select>

      <button class="full-btn" onclick="signup()">Create Account</button>
    </div>

  </div>
</div>

<div class="app" id="app">

  <div class="sidebar">

    <div class="logo">IRONCORE</div>

    <div id="navMenu"></div>

    <button class="logout-btn" onclick="logout()">Logout</button>

  </div>

  <div class="main">

    <div class="topbar">
      <h1 id="pageTitle">Dashboard</h1>
      <p id="userInfo"></p>
    </div>

    <div id="pagesContainer"></div>

  </div>
</div>

<script>

const DB = {
  get(key){
    return JSON.parse(localStorage.getItem(key)) || [];
  },

  set(key,value){
    localStorage.setItem(key,JSON.stringify(value));
  }
};


function seedAdmin(){
  const users = DB.get('users');

  if(users.length === 0){
    users.push({
      id:Date.now(),
      name:'Admin User',
      email:'admin@gym.com',
      password:'admin123',
      role:'admin'
    });

    DB.set('users',users);
  }
}

seedAdmin();


let currentUser = null;


function switchTab(type){

  document.getElementById('loginForm').style.display =
  type === 'login' ? 'block' : 'none';

  document.getElementById('signupForm').style.display =
  type === 'signup' ? 'block' : 'none';

  document.getElementById('loginTab').classList.remove('active');
  document.getElementById('signupTab').classList.remove('active');

  if(type === 'login'){
    document.getElementById('loginTab').classList.add('active');
  }
  else{
    document.getElementById('signupTab').classList.add('active');
  }
}


function signup(){

  const name = document.getElementById('signupName').value;
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  const role = document.getElementById('signupRole').value;

  if(!name || !email || !password){
    alert('Fill all fields');
    return;
  }

  const users = DB.get('users');

  const exists = users.find(user => user.email === email);

  if(exists){
    alert('Email already exists');
    return;
  }

  users.push({
    id:Date.now(),
    name,
    email,
    password,
    role
  });

  DB.set('users',users);

  alert('Account created successfully');

  switchTab('login');
}


function login(){

  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;

  const users = DB.get('users');

  const user = users.find(u =>
    u.email === email && u.password === password
  );

  if(!user){
    alert('Invalid login details');
    return;
  }

  currentUser = user;

  localStorage.setItem('loggedInUser',JSON.stringify(user));

  openApp();
}


function logout(){
  localStorage.removeItem('loggedInUser');
  document.getElementById('app').classList.remove('show');
  document.getElementById('authScreen').style.display = 'flex';
}


function openApp(){

  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('app').classList.add('show');

  document.getElementById('userInfo').innerText =
  currentUser.name + ' (' + currentUser.role + ')';

  buildSidebar();
  buildPages();

  showPage('dashboard');
}


function buildSidebar(){

  let items = [
    'dashboard',
    'members',
    'trainers',
    'classes',
    'payments',
    'attendance',
    'reports',
    'profile'
  ];

  if(currentUser.role === 'member'){
    items = ['dashboard','classes','payments','attendance','profile'];
  }

  if(currentUser.role === 'trainer'){
    items = ['dashboard','members','classes','profile'];
  }

  const nav = document.getElementById('navMenu');

  nav.innerHTML = '';

  items.forEach(item=>{

    nav.innerHTML += `
      <div class="nav-item" onclick="showPage('${item}')">
        ${item.charAt(0).toUpperCase() + item.slice(1)}
      </div>
    `;
  });
}


function buildPages(){

  const users = DB.get('users');

  const members = users.filter(u=>u.role==='member');
  const trainers = users.filter(u=>u.role==='trainer');

  const pages = `

  <div class="page" id="dashboard">

    <div class="cards">

      <div class="card">
        <h3>Total Members</h3>
        <h1>${members.length}</h1>
      </div>

      <div class="card">
        <h3>Total Trainers</h3>
        <h1>${trainers.length}</h1>
      </div>

      <div class="card">
        <h3>Total Users</h3>
        <h1>${users.length}</h1>
      </div>

      <div class="card">
        <h3>Revenue</h3>
        <h1>₦500K</h1>
      </div>

    </div>

  </div>


  <div class="page" id="members">

    <div class="table-box">

      <div class="table-header">
        <h2>Members</h2>
      </div>

      <table>

        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
          </tr>
        </thead>

        <tbody>

          ${members.map(member=>`
            <tr>
              <td>${member.name}</td>
              <td>${member.email}</td>
              <td><span class="badge green">Member</span></td>
            </tr>
          `).join('')}

        </tbody>

      </table>

    </div>

  </div>


  <div class="page" id="trainers">

    <div class="table-box">

      <div class="table-header">
        <h2>Trainers</h2>
      </div>

      <table>

        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
          </tr>
        </thead>

        <tbody>

          ${trainers.map(trainer=>`
            <tr>
              <td>${trainer.name}</td>
              <td>${trainer.email}</td>
              <td><span class="badge yellow">Trainer</span></td>
            </tr>
          `).join('')}

        </tbody>

      </table>

    </div>

  </div>


  <div class="page" id="classes">

    <div class="class-card">
      <h2>Yoga Flow</h2>
      <br>
      <p>Trainer: Mike</p>
      <p>Time: 7:00 AM</p>
    </div>

    <div class="class-card">
      <h2>Zumba Blast</h2>
      <br>
      <p>Trainer: Sarah</p>
      <p>Time: 9:00 AM</p>
    </div>

  </div>


  <div class="page" id="payments">

    <div class="table-box">

      <div class="table-header">
        <h2>Payments</h2>
      </div>

      <table>

        <thead>
          <tr>
            <th>Member</th>
            <th>Amount</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody>

          <tr>
            <td>Jane Doe</td>
            <td>₦15,000</td>
            <td><span class="badge green">Paid</span></td>
          </tr>

        </tbody>

      </table>

    </div>

  </div>


  <div class="page" id="attendance">

    <div class="table-box">

      <div class="table-header">
        <h2>Attendance</h2>
      </div>

      <table>

        <thead>
          <tr>
            <th>Name</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody>

          <tr>
            <td>Jane Doe</td>
            <td>Today</td>
            <td><span class="badge green">Present</span></td>
          </tr>

        </tbody>

      </table>

    </div>

  </div>


  <div class="page" id="reports">

    <div class="cards">

      <div class="card">
        <h3>Monthly Revenue</h3>
        <h1>₦500,000</h1>
      </div>

      <div class="card">
        <h3>Attendance</h3>
        <h1>320</h1>
      </div>

    </div>

  </div>


  <div class="page" id="profile">

    <div class="profile-box">

      <h1>${currentUser.name}</h1>

      <br>

      <p><strong>Email:</strong> ${currentUser.email}</p>

      <br>

      <p><strong>Role:</strong> ${currentUser.role}</p>

    </div>

  </div>

  `;

  document.getElementById('pagesContainer').innerHTML = pages;
}


function showPage(pageId){

  document.querySelectorAll('.page').forEach(page=>{
    page.classList.remove('active');
  });

  const page = document.getElementById(pageId);

  if(page){
    page.classList.add('active');
  }

  document.querySelectorAll('.nav-item').forEach(item=>{
    item.classList.remove('active');

    if(item.innerText.toLowerCase() === pageId){
      item.classList.add('active');
    }
  });

  document.getElementById('pageTitle').innerText =
  pageId.charAt(0).toUpperCase() + pageId.slice(1);
}


const savedUser = JSON.parse(localStorage.getItem('loggedInUser'));

if(savedUser){
  currentUser = savedUser;
  openApp();
}

</script>

</body>
</html>
``` -->
