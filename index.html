<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>All Pages - Single Index</title>
    <style>
      body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f4f4f4}
      header{background:#2d89ef;color:#fff;padding:12px 16px}
      nav{display:flex;gap:8px}
      nav button{padding:8px 12px;border:0;background:#fff;color:#2d89ef;border-radius:4px;cursor:pointer}
      nav button.active{background:#174ea6;color:#fff}
      .frame{width:100%;height:calc(100vh - 60px);border:0;display:none}
      .frame.show{display:block}
    </style>
  </head>
  <body>
    <header>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <h2 style="margin:0">Project Pages</h2>
        <nav id="nav">
          <button data-target="home" class="active">Home</button>
          <button data-target="calculator">Calculator</button>
          <button data-target="test">Test</button>
          <button data-target="todo">Todo</button>
        </nav>
      </div>
    </header>

    <main>
      <iframe id="home" class="frame show" srcdoc="<div style='padding:24px'><h3>Welcome</h3><p>Use the tabs to open the embedded pages: Calculator, Test, and Todo.</p><ul><li><a href='calculator.html' target='_blank'>Open Calculator in new tab</a></li><li><a href='test.html' target='_blank'>Open Test page in new tab</a></li><li><a href='Todo.html' target='_blank'>Open Todo in new tab</a></li></ul></div>"></iframe>

      <iframe id="calculator" class="frame" src="calculator.html"></iframe>
      <iframe id="test" class="frame" src="test.html"></iframe>
      <iframe id="todo" class="frame" src="Todo.html"></iframe>
    </main>

    <script>
      var buttons = document.querySelectorAll('nav button');
      buttons.forEach(function(b){
        b.addEventListener('click', function(){
          buttons.forEach(function(x){x.classList.remove('active')});
          b.classList.add('active');
          var target = b.getAttribute('data-target');
          document.querySelectorAll('.frame').forEach(function(f){
            if (f.id === target) f.classList.add('show'); else f.classList.remove('show');
          });
        });
      });
    </script>
  </body>
</html>
