<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4d0000, #060300);
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .container{
            width: 500px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            background:linear-gradient(to bottom, #4d0000, #060300);
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);
        }

        h1{
            text-align: center;
            color: white;
        }

        input{
            width: 70%;
            padding: 10px;
            background:linear-gradient(to right, #4d0000, #060300);
        }

        button{
            padding: 10px;
            margin: 2px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            background:linear-gradient(to right, #4d0000, #060300);
        }

        .add-btn{
            background: green;
        }

        .done-btn{
            background: blue;
        }

        .edit-btn{
            background: orange;
        }

        .delete-btn{
            background: red;
        }

        table{
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background:linear-gradient(to right, #4d0000, #060300);
            color: white;
        }

        th, td{
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        .done{
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Todo App</h1>

    <input type="text" id="task" placeholder="Enter task">
    <button class="add-btn" onclick="addTodo()">Add</button>

    <table>
        <tr>
            <th>No</th>
            <th>Task</th>
            <th>Actions</th>
        </tr>

        <tbody id="list"></tbody>
    </table>

</div>

<script>

let todos = JSON.parse(localStorage.getItem("todos")) || [];

function saveTodo(){
    localStorage.setItem("todos", JSON.stringify(todos));
}

function addTodo(){

    let input = document.getElementById("task");

    if(input.value == ""){
        alert("Please enter a task!");
        return;
    }

    todos.push({
        task: input.value,
        done: false
    });

    saveTodo();

    input.value = "";

    showTodo();
}

function showTodo(){

    let list = document.getElementById("list");

    list.innerHTML = "";

    for(let i = 0; i < todos.length; i++){

        let style = "";

        if(todos[i].done){
            style = "done";
        }

        list.innerHTML += `
        <tr>
            <td>${i + 1}</td>
            <td class="${style}">${todos[i].task}</td>
            <td>
                <button class="done-btn" onclick="doneTodo(${i})">Done</button>
                <button class="edit-btn" onclick="editTodo(${i})">Edit</button>
                <button class="delete-btn" onclick="deleteTodo(${i})">Delete</button>
            </td>
        </tr>
        `;
    }
}

function doneTodo(index){

    todos[index].done = !todos[index].done;

    saveTodo();

    showTodo();
}

function editTodo(index){

    let newTask = prompt("Edit Task", todos[index].task);

    if(newTask != null && newTask != ""){
        todos[index].task = newTask;

        saveTodo();

        showTodo();
    }
}

function deleteTodo(index){

    todos.splice(index, 1);

    saveTodo();

    showTodo();
}

showTodo();

</script>

</body>
</html>
